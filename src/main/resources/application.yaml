spring:
  application:
    name: triage-academico

  datasource:
    url: jdbc:mariadb://localhost:3306/triage_academico_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        globally_quoted_identifiers: true # Permite crear UUID

server:
  port: 8080